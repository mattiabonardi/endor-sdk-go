name: Generate Documentation

on:
  push:
    branches: [ main, feat/* ]
    paths: 
      - 'sdk/**/*.go'
      - 'tools/gendocs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'sdk/**/*.go'
      - 'tools/gendocs/**'

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        
    - name: Generate API documentation
      run: |
        chmod +x tools/gendocs/generate.sh
        ./tools/gendocs/generate.sh
        
    - name: Check for documentation changes
      id: docs-changed
      run: |
        if git diff --quiet docs/api/; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit documentation updates
      if: steps.docs-changed.outputs.changed == 'true' && github.event_name == 'push'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs/api/
        git commit -m "📚 Update API documentation [skip ci]" || exit 0
        git push
        
    - name: Upload documentation artifacts
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v3
      with:
        name: api-documentation
        path: docs/api/
        retention-days: 7
